<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Stealth Cam Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap');
        body { font-family: 'JetBrains+Mono', monospace; background-color: #0a0a0a; color: #10b981; overflow: hidden; }
        .scanline { background: linear-gradient(to bottom, rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06)); background-size: 100% 2px, 3px 100%; pointer-events: none; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .thermal { filter: invert(1) hue-rotate(180deg) saturate(2) brightness(1.1) !important; }
        .night { filter: sepia(1) hue-rotate(70deg) saturate(3) brightness(0.8) !important; }
    </style>
</head>
<body class="flex flex-col h-screen max-w-md mx-auto relative border-x border-emerald-900/20">

    <!-- AYARLAR MODAL -->
    <div id="settingsModal" class="fixed inset-0 z-50 bg-slate-950 p-6 hidden overflow-y-auto">
        <div class="flex justify-between items-center mb-6">
            <h2 class="text-xl font-bold">SİSTEM AYARLARI</h2>
            <button onclick="toggleSettings()" class="bg-emerald-600 text-black px-4 py-2 rounded font-bold text-xs">KAPAT</button>
        </div>
        
        <div class="space-y-6">
            <div class="bg-zinc-900 p-4 rounded-lg border border-emerald-900/30">
                <label class="block text-[10px] mb-2 opacity-50 uppercase">Manuel Tarih/Saat Ayarı</label>
                <input type="datetime-local" id="manualDateTime" class="w-full bg-black border border-emerald-900/50 p-2 rounded text-sm mb-2 outline-none focus:border-emerald-400">
                <button onclick="setManualTime()" class="w-full bg-emerald-900/20 border border-emerald-500 py-2 rounded text-xs font-bold">SAATİ SENKRONİZE ET</button>
            </div>

            <div class="bg-zinc-900 p-4 rounded-lg border border-emerald-900/30">
                <label class="block text-[10px] mb-2 opacity-50 uppercase">Kamera Video Linkleri</label>
                <div id="camList" class="space-y-2 mb-4"></div>
                <input type="text" id="newCamName" placeholder="Kamera Adı" class="w-full bg-black border border-emerald-900/50 p-2 rounded text-sm mb-2 outline-none focus:border-emerald-400">
                <input type="text" id="newCamUrl" placeholder="Video Linki (.mp4)" class="w-full bg-black border border-emerald-900/50 p-2 rounded text-sm mb-2 outline-none focus:border-emerald-400">
                <button onclick="addCamera()" class="w-full bg-blue-900/20 border border-blue-500 text-blue-400 py-2 rounded text-xs font-bold">KAMERA EKLE</button>
            </div>
        </div>
    </div>

    <!-- ANA EKRAN -->
    <header class="p-4 border-b border-emerald-900/30 flex justify-between items-end">
        <div>
            <div class="text-[10px] font-bold tracking-widest text-emerald-700 uppercase">Protokol: Omega-X</div>
            <div class="flex items-center gap-2">
                <div class="w-2 h-2 bg-emerald-500 rounded-full animate-pulse"></div>
                <span class="text-xs">BAĞLANTI AKTİF</span>
            </div>
        </div>
        <button onclick="toggleSettings()" class="p-2 bg-zinc-900 rounded border border-emerald-900/20">
            <i data-lucide="settings" class="w-4 h-4 text-emerald-500"></i>
        </button>
    </header>

    <main class="flex-grow flex flex-col p-4 overflow-hidden">
        <!-- Kamera Ekranı -->
        <div id="videoContainer" class="relative aspect-[4/3] bg-black rounded-lg border border-emerald-500/30 overflow-hidden group shadow-[0_0_30px_rgba(0,0,0,0.5)]">
            <div class="scanline absolute inset-0 z-20"></div>
            
            <div id="displayArea" class="w-full h-full relative">
                <!-- Videolar buraya gelecek -->
            </div>

            <!-- HUD Overlay -->
            <div class="absolute inset-0 z-30 p-3 flex flex-col justify-between pointer-events-none">
                <div class="flex justify-between items-start">
                    <div class="bg-black/60 px-2 py-1 rounded border border-white/5">
                        <div class="text-red-500 font-bold text-[8px] animate-pulse flex items-center gap-1">● REC</div>
                        <div id="hudTime" class="text-white text-[9px]">01.01.2026 00:00:00</div>
                    </div>
                    <div id="camLabel" class="bg-black/60 px-2 py-1 rounded border border-white/5 text-[9px] text-emerald-400">CAM_1</div>
                </div>
                <div class="flex justify-center opacity-30">
                    <div class="w-10 h-10 border border-emerald-500 rounded-full flex items-center justify-center">
                        <div class="w-1 h-1 bg-emerald-500 rounded-full"></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Kamera Seçici -->
        <div id="camSwitcher" class="flex gap-1 mt-4 overflow-x-auto no-scrollbar pb-2"></div>

        <!-- Modlar -->
        <div class="grid grid-cols-3 gap-2 mt-4">
            <button onclick="setMode('normal')" class="bg-zinc-900 border border-emerald-900/30 p-3 rounded flex flex-col items-center gap-1 active:bg-emerald-500 active:text-black">
                <i data-lucide="eye" class="w-4 h-4"></i><span class="text-[8px] font-bold">NORMAL</span>
            </button>
            <button onclick="setMode('night')" class="bg-zinc-900 border border-emerald-900/30 p-3 rounded flex flex-col items-center gap-1 active:bg-emerald-500 active:text-black">
                <i data-lucide="activity" class="w-4 h-4"></i><span class="text-[8px] font-bold">GECE</span>
            </button>
            <button onclick="setMode('thermal')" class="bg-zinc-900 border border-emerald-900/30 p-3 rounded flex flex-col items-center gap-1 active:bg-emerald-500 active:text-black">
                <i data-lucide="thermometer" class="w-4 h-4"></i><span class="text-[8px] font-bold">TERMAL</span>
            </button>
        </div>

        <!-- Kontroller -->
        <div class="mt-6 grid grid-cols-2 gap-2">
            <button id="zoomBtn" onclick="toggleZoom()" class="bg-zinc-950 border border-emerald-900/50 p-4 rounded-lg flex items-center gap-3 active:scale-95 transition">
                <i data-lucide="maximize-2" class="w-5 h-5"></i>
                <div class="text-left text-[10px] font-bold">ZOOM <span id="zoomStatus">KAPALI</span></div>
            </button>
            <button id="alarmBtn" onclick="toggleAlarm()" class="bg-zinc-950 border border-red-900/50 p-4 rounded-lg flex items-center gap-3 active:scale-95 transition text-red-500">
                <i data-lucide="alert-triangle" class="w-5 h-5"></i>
                <div class="text-left text-[10px] font-bold">ALARM <span id="alarmStatus">KAPALI</span></div>
            </button>
        </div>
    </main>

    <footer class="p-4 text-center text-[7px] opacity-30 tracking-[0.3em]">
        ENCRYPTED SECURE LINK // BUILD 4.2.1
    </footer>

    <script>
        // --- DATA ---
        let cameras = [
            { id: 1, name: 'SALON', url: 'https://assets.mixkit.co/videos/preview/mixkit-security-camera-in-a-dark-hallway-32692-large.mp4' },
            { id: 2, name: 'KORİDOR', url: 'https://assets.mixkit.co/videos/preview/mixkit-top-view-of-a-street-with-people-walking-34547-large.mp4' }
        ];
        let activeCamId = 1;
        let isSplit = false;
        let viewMode = 'normal';
        let isZoomed = false;
        let isAlarmOn = false;
        let systemTime = new Date();
        let timeOffset = 0;

        const alarmAudio = new Audio("https://assets.mixkit.co/sfx/preview/mixkit-warning-alarm-buzzer-991.mp3");
        alarmAudio.loop = true;
        alarmAudio.volume = 0.15;

        // --- CORE ---
        function init() {
            lucide.createIcons();
            renderCamSwitcher();
            renderVideo();
            renderSettingsList();
            
            setInterval(() => {
                systemTime = new Date(Date.now() + timeOffset);
                const pad = n => n.toString().padStart(2, '0');
                document.getElementById('hudTime').innerText = `${pad(systemTime.getDate())}.${pad(systemTime.getMonth()+1)}.${systemTime.getFullYear()} ${pad(systemTime.getHours())}:${pad(systemTime.getMinutes())}:${pad(systemTime.getSeconds())}`;
            }, 1000);
        }

        function renderVideo() {
            const area = document.getElementById('displayArea');
            area.innerHTML = '';
            
            if (isSplit) {
                area.className = "w-full h-full grid grid-cols-2 grid-rows-2";
                for(let i=0; i<4; i++) {
                    const cam = cameras[i];
                    const div = document.createElement('div');
                    div.className = "border border-zinc-900 bg-black relative overflow-hidden";
                    if(cam) {
                        div.innerHTML = `<video src="${cam.url}" autoPlay muted loop playsInline class="w-full h-full object-cover ${viewMode}"></video>`;
                    } else {
                        div.innerHTML = `<div class="w-full h-full flex items-center justify-center text-[6px] opacity-20 italic">SİNYAL YOK</div>`;
                    }
                    area.appendChild(div);
                }
                document.getElementById('camLabel').innerText = "GRID_VIEW";
            } else {
                area.className = "w-full h-full";
                const cam = cameras.find(c => c.id === activeCamId) || cameras[0];
                const video = document.createElement('video');
                video.src = cam.url;
                video.autoplay = true;
                video.muted = true;
                video.loop = true;
                video.playsInline = true;
                video.className = `w-full h-full object-cover transition-all duration-500 ${viewMode} ${isZoomed ? 'scale-150' : 'scale-100'}`;
                area.appendChild(video);
                document.getElementById('camLabel').innerText = cam.name;
            }
        }

        function renderCamSwitcher() {
            const container = document.getElementById('camSwitcher');
            container.innerHTML = '';
            cameras.forEach(cam => {
                const btn = document.createElement('button');
                btn.className = `min-w-[70px] py-2 px-2 text-[9px] font-bold rounded border ${activeCamId === cam.id && !isSplit ? 'bg-emerald-600 text-black border-emerald-400' : 'bg-zinc-900 text-emerald-500 border-emerald-900/30'}`;
                btn.innerText = `CAM ${cam.id}`;
                btn.onclick = () => { activeCamId = cam.id; isSplit = false; renderVideo(); renderCamSwitcher(); };
                container.appendChild(btn);
            });
            const splitBtn = document.createElement('button');
            splitBtn.className = `min-w-[70px] py-2 px-2 text-[9px] font-bold rounded border ${isSplit ? 'bg-blue-600 text-white' : 'bg-zinc-900 text-blue-400 border-blue-900/30'}`;
            splitBtn.innerHTML = `<div class="flex items-center justify-center gap-1">DÖRTLE</div>`;
            splitBtn.onclick = () => { isSplit = true; renderVideo(); renderCamSwitcher(); };
            container.appendChild(splitBtn);
        }

        // --- ACTIONS ---
        function setMode(m) { viewMode = m; renderVideo(); }
        function toggleZoom() { 
            if(isSplit) return;
            isZoomed = !isZoomed; 
            document.getElementById('zoomStatus').innerText = isZoomed ? 'AÇIK' : 'KAPALI';
            renderVideo(); 
        }
        function toggleAlarm() {
            isAlarmOn = !isAlarmOn;
            if(isAlarmOn) alarmAudio.play(); else { alarmAudio.pause(); alarmAudio.currentTime = 0; }
            document.getElementById('alarmStatus').innerText = isAlarmOn ? 'AÇIK' : 'KAPALI';
        }

        // --- SETTINGS ---
        function toggleSettings() { 
            const s = document.getElementById('settingsModal');
            s.classList.toggle('hidden');
            renderSettingsList();
        }

        function setManualTime() {
            const val = document.getElementById('manualDateTime').value;
            if(val) {
                const target = new Date(val);
                timeOffset = target.getTime() - Date.now();
                alert("Sistem saati senkronize edildi!");
            }
        }

        function addCamera() {
            const name = document.getElementById('newCamName').value;
            const url = document.getElementById('newCamUrl').value;
            if(name && url) {
                cameras.push({ id: cameras.length + 1, name: name.toUpperCase(), url: url });
                document.getElementById('newCamName').value = '';
                document.getElementById('newCamUrl').value = '';
                renderCamSwitcher();
                renderSettingsList();
            }
        }

        function deleteCam(id) {
            if(cameras.length > 1) {
                cameras = cameras.filter(c => c.id !== id);
                renderCamSwitcher();
                renderSettingsList();
            }
        }

        function renderSettingsList() {
            const list = document.getElementById('camList');
            list.innerHTML = '';
            cameras.forEach(cam => {
                const item = document.createElement('div');
                item.className = "flex justify-between items-center bg-black p-2 rounded border border-emerald-900/20 mb-2";
                item.innerHTML = `<div><div class="text-[10px] font-bold">${cam.name}</div><div class="text-[8px] opacity-40 truncate w-40">${cam.url}</div></div>
                <button onclick="deleteCam(${cam.id})" class="text-red-500 text-xs">SİL</button>`;
                list.appendChild(item);
            });
        }

        window.onload = init;
    </script>
</body>
</html>
